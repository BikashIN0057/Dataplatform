services:

  postgres:
    image: postgres:16
    container_name: obs-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - obsnet
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: obs-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:${PROMETHEUS_PORT}:9090"
    networks:
      - obsnet
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: obs-grafana
    env_file:
      - .env
    environment:
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SERVER_ROOT_URL: "http://${OBSERVABILITY_HOST}:${GRAFANA_PORT}"
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "0.0.0.0:${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    networks:
      - obsnet
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: obs-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "0.0.0.0:${LOKI_PORT}:3100"
    networks:
      - obsnet
    restart: unless-stopped

  obs-alloy:
    image: grafana/alloy:latest
    container_name: obs-alloy
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "0.0.0.0:${ALLOY_PORT}:12345"
    depends_on:
      - loki
    networks:
      - obsnet
    restart: unless-stopped

  health-api:
    build: ./health-api
    container_name: obs-health-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@obs-postgres:5432/${POSTGRES_DB}
      PROMETHEUS_BASE_URL: http://obs-prometheus:9090
      GRAFANA_HEALTH_URL: http://obs-grafana:3000/api/health
      KAFKA_HOST: "${OBSERVABILITY_HOST}"
      KAFKA_PORT: "9092"
    ports:
      - "0.0.0.0:${HEALTH_API_PORT}:8000"
    depends_on:
      - postgres
      - prometheus
      - grafana
    networks:
      - obsnet
    restart: unless-stopped

networks:
  obsnet:
    name: observability-stack_default

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
