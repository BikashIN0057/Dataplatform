services:

  remediation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remediation-api
    env_file:
      - .env
    environment:
      REMEDIATION_API_URL: http://${REMEDIATION_HOST}:${REMEDIATION_API_PORT}
      REMEDIATION_SHARED_TOKEN: ${REMEDIATION_SHARED_TOKEN}
      REMEDIATION_DB: ${REMEDIATION_DB}
      REMEDIATION_RUNBOOKS: ${REMEDIATION_RUNBOOKS}
      REMEDIATION_SERVICE_CATALOG: ${REMEDIATION_SERVICE_CATALOG}
      HEALTH_API_URL: ${HEALTH_API_URL}
      LOKI_BASE_URL: ${LOKI_BASE_URL}
    ports:
      - "0.0.0.0:${REMEDIATION_API_PORT}:8808"
    volumes:
      - ./data:/app/data
      - ./remediation_agent:/app/remediation_agent:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8808/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - obsnet
    restart: unless-stopped

networks:
  obsnet:
    external: true
    name: observability-stack_default
