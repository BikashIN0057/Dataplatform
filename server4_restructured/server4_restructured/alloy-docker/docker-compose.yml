services:
  obs-alloy:
    image: grafana/alloy:latest
    container_name: obs-alloy
    env_file:
      - .env
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "0.0.0.0:${ALLOY_PORT}:12345"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:12345/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - obsnet
    restart: unless-stopped

networks:
  obsnet:
    external: true
    name: observability-stack_default
