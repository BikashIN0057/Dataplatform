services:
  kafka-api:
    build: .
    container_name: obs-kafka-api
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:${KAFKA_API_PORT}:8601"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8601/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - obsnet
    restart: unless-stopped

networks:
  obsnet:
    external: true
    name: observability-stack_default
