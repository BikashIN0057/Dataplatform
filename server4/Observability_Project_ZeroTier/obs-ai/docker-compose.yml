services:

  obs-ollama:
    image: ollama/ollama:latest
    container_name: obs-ollama
    ports:
      - "0.0.0.0:11434:11434"      # accessible on ZeroTier 10.155.38.64:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - obsnet
    profiles:
      - ollama

  obs-log-ai-api:
    build: ./app
    container_name: obs-log-ai-api
    env_file:
      - .env
    environment:
      LOKI_URL: http://obs-loki:3100             # reaches obs-loki via shared obsnet
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://obs-ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ARCHIVE_DIR: /data/archive
      DATA_DIR: /data
      LOKI_RETENTION_PERIOD: 168h
      LOKI_TENANT_ID: fake
    ports:
      - "0.0.0.0:8088:8088"        # accessible on ZeroTier 10.155.38.64:8088
    volumes:
      - ./archive:/data/archive
      - ./data:/data
    restart: unless-stopped
    networks:
      - obsnet

  obs-event-collector:
    build:
      context: .
      dockerfile: Dockerfile.event-collector
    container_name: obs-event-collector
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - obsnet                      # fixed: was missing network, now on obsnet

networks:
  obsnet:
    external: true
    name: observability-stack_default  # joins the same network as observability-stack

volumes:
  ollama_data:
    external: true
